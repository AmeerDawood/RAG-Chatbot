<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UOJ Chatbot — Ask</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 720px;">
    <h2 class="mb-4 text-primary text-center">University of Jhang Chatbot</h2>

    <div class="card mb-4">
        <div class="card-body">
            <h6 class="card-title">Optional: sign in</h6>
            <p class="text-muted small">Signing in attaches your questions to your chat history. Anonymous questions still work.</p>
            <div class="row g-2">
                <div class="col-5"><input id="identifier" class="form-control form-control-sm" placeholder="email or username"></div>
                <div class="col-5"><input id="password" type="password" class="form-control form-control-sm" placeholder="password"></div>
                <div class="col-2"><button id="loginBtn" class="btn btn-sm btn-outline-secondary w-100">Login</button></div>
            </div>
            <div id="authStatus" class="small text-muted mt-2">Not signed in.</div>
        </div>
    </div>

    <form id="queryForm" class="mb-3">
        <div class="input-group">
            <input type="text" id="queryInput" class="form-control" placeholder="Ask something about the University of Jhang..." required>
            <button class="btn btn-success" type="submit" id="askBtn">Ask</button>
        </div>
    </form>

    <div id="loading" class="text-center d-none">
        <div class="spinner-border text-success" role="status"></div>
        <div class="small text-muted mt-2">Thinking...</div>
    </div>

    <div id="errorBox" class="alert alert-danger d-none"></div>

    <div id="responseWrap" class="d-none">
        <h6 class="text-secondary">Response</h6>
        <div class="bg-white p-4 rounded shadow-sm border" id="responseBody"></div>
    </div>
</div>

<script>
const API_BASE = '';
let accessToken = null;

function setAuthStatus(text) {
    document.getElementById('authStatus').textContent = text;
}

document.getElementById('loginBtn').addEventListener('click', async () => {
    const identifier = document.getElementById('identifier').value.trim();
    const password = document.getElementById('password').value;
    if (!identifier || !password) return;
    try {
        const res = await fetch(`${API_BASE}/auth/login/`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({identifier, password}),
        });
        const data = await res.json();
        if (!res.ok) {
            setAuthStatus(`Login failed: ${data.non_field_errors || JSON.stringify(data)}`);
            return;
        }
        accessToken = data.tokens.access;
        setAuthStatus('Signed in.');
    } catch (err) {
        setAuthStatus(`Login error: ${err}`);
    }
});

async function pollChatResponse(chatId) {
    for (let i = 0; i < 20; i++) {
        await new Promise(r => setTimeout(r, 1000));
        const res = await fetch(`${API_BASE}/chat-response/${chatId}/`, {
            headers: accessToken ? {'Authorization': `Bearer ${accessToken}`} : {},
        });
        if (!res.ok) return null;
        const data = await res.json();
        if (data.ready) return data.answer;
    }
    return 'Still processing — please check back shortly.';
}

document.getElementById('queryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const query = document.getElementById('queryInput').value.trim();
    if (!query) return;

    const loading = document.getElementById('loading');
    const errorBox = document.getElementById('errorBox');
    const responseWrap = document.getElementById('responseWrap');
    const responseBody = document.getElementById('responseBody');
    const askBtn = document.getElementById('askBtn');

    loading.classList.remove('d-none');
    errorBox.classList.add('d-none');
    responseWrap.classList.add('d-none');
    askBtn.disabled = true;

    try {
        const headers = {'Content-Type': 'application/json'};
        if (accessToken) headers['Authorization'] = `Bearer ${accessToken}`;

        const res = await fetch(`${API_BASE}/query/`, {
            method: 'POST',
            headers,
            body: JSON.stringify({query}),
        });
        const data = await res.json();

        if (!res.ok) {
            errorBox.textContent = data.error || 'Something went wrong.';
            errorBox.classList.remove('d-none');
            return;
        }

        let answer = data.response;
        if (res.status === 202 && data.chat_id) {
            answer = await pollChatResponse(data.chat_id);
        }

        responseBody.textContent = answer;
        responseWrap.classList.remove('d-none');
    } catch (err) {
        errorBox.textContent = `Request failed: ${err}`;
        errorBox.classList.remove('d-none');
    } finally {
        loading.classList.add('d-none');
        askBtn.disabled = false;
    }
});
</script>
</body>
</html>
