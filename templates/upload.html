<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UOJ Chatbot — Admin Upload</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">
<div class="container" style="max-width: 720px;">
    <h2 class="mb-4">Upload Document for Indexing</h2>
    <p class="text-muted small">This endpoint requires an admin (staff) account — sign in below first.</p>

    <div class="card mb-4">
        <div class="card-body">
            <h6 class="card-title">Admin sign in</h6>
            <div class="row g-2">
                <div class="col-5"><input id="identifier" class="form-control form-control-sm" placeholder="email or username"></div>
                <div class="col-5"><input id="password" type="password" class="form-control form-control-sm" placeholder="password"></div>
                <div class="col-2"><button id="loginBtn" class="btn btn-sm btn-outline-secondary w-100">Login</button></div>
            </div>
            <div id="authStatus" class="small text-muted mt-2">Not signed in.</div>
        </div>
    </div>

    <form id="uploadForm">
        <div class="mb-3">
            <label class="form-label">File title</label>
            <input type="text" id="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">File (.pdf, .txt, .docx, .csv, .xlsx)</label>
            <input type="file" id="file" class="form-control" accept=".pdf,.txt,.docx,.csv,.xlsx" required>
        </div>
        <button type="submit" class="btn btn-primary" id="uploadBtn">Upload &amp; Index</button>
    </form>

    <div id="loading" class="mt-3 d-none">
        <div class="spinner-border spinner-border-sm text-primary"></div>
        <span class="small text-muted ms-2" id="loadingText">Uploading...</span>
    </div>

    <div id="errorBox" class="alert alert-danger mt-3 d-none"></div>
    <div id="successBox" class="alert alert-success mt-3 d-none"></div>
</div>

<script>
const API_BASE = '';
let accessToken = null;

document.getElementById('loginBtn').addEventListener('click', async () => {
    const identifier = document.getElementById('identifier').value.trim();
    const password = document.getElementById('password').value;
    if (!identifier || !password) return;
    const authStatus = document.getElementById('authStatus');
    try {
        const res = await fetch(`${API_BASE}/auth/login/`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({identifier, password}),
        });
        const data = await res.json();
        if (!res.ok) {
            authStatus.textContent = `Login failed: ${JSON.stringify(data)}`;
            return;
        }
        if (!data.is_staff) {
            authStatus.textContent = 'Signed in, but this account is not an admin — upload will be rejected.';
        } else {
            authStatus.textContent = 'Signed in as admin.';
        }
        accessToken = data.tokens.access;
    } catch (err) {
        authStatus.textContent = `Login error: ${err}`;
    }
});

async function pollStatus(uploadedId, loadingText) {
    for (let i = 0; i < 30; i++) {
        await new Promise(r => setTimeout(r, 1500));
        const res = await fetch(`${API_BASE}/upload/status/${uploadedId}/`, {
            headers: accessToken ? {'Authorization': `Bearer ${accessToken}`} : {},
        });
        if (!res.ok) return {status: 'failed', error_message: 'Status check failed.'};
        const data = await res.json();
        loadingText.textContent = `Indexing... (status: ${data.status})`;
        if (data.status === 'success' || data.status === 'failed') return data;
    }
    return {status: 'pending', error_message: 'Still processing — check back later.'};
}

document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('title').value.trim();
    const file = document.getElementById('file').files[0];
    if (!title || !file) return;

    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');
    const uploadBtn = document.getElementById('uploadBtn');

    loading.classList.remove('d-none');
    loadingText.textContent = 'Uploading...';
    errorBox.classList.add('d-none');
    successBox.classList.add('d-none');
    uploadBtn.disabled = true;

    try {
        const formData = new FormData();
        formData.append('title', title);
        formData.append('file', file);

        const headers = {};
        if (accessToken) headers['Authorization'] = `Bearer ${accessToken}`;

        const res = await fetch(`${API_BASE}/upload/`, {method: 'POST', headers, body: formData});
        const data = await res.json();

        if (!res.ok) {
            errorBox.textContent = data.error || data.detail || 'Upload failed.';
            errorBox.classList.remove('d-none');
            return;
        }

        if (data.status === 'success') {
            successBox.textContent = data.message;
            successBox.classList.remove('d-none');
            return;
        }

        const finalStatus = await pollStatus(data.uploaded_id, loadingText);
        if (finalStatus.status === 'success') {
            successBox.textContent = 'File indexed successfully.';
            successBox.classList.remove('d-none');
        } else {
            errorBox.textContent = finalStatus.error_message || 'Indexing failed.';
            errorBox.classList.remove('d-none');
        }
    } catch (err) {
        errorBox.textContent = `Request failed: ${err}`;
        errorBox.classList.remove('d-none');
    } finally {
        loading.classList.add('d-none');
        uploadBtn.disabled = false;
    }
});
</script>
</body>
</html>
